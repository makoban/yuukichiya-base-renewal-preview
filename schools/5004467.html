<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>衣台高校 商品候補</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; color: #222426; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; background: #f4f7f5; line-height: 1.7; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    header { background: #fff; border-bottom: 1px solid #dde4e8; }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 28px; }
    .top { display: flex; justify-content: space-between; gap: 16px; align-items: center; }
    h1 { margin: 0; font-size: 34px; line-height: 1.25; }
    p { color: #68727d; font-weight: 700; }
    .button { display: inline-flex; align-items: center; justify-content: center; min-height: 44px; padding: 0 16px; border-radius: 8px; background: #2f7d5b; color: #fff; font-weight: 900; }
    .ghost { border: 1px solid #dde4e8; background: #fff; color: #222426; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .grid { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 20px; margin-top: 24px; }
    .product-card { display: grid; grid-template-rows: auto 1fr; overflow: hidden; border: 1px solid #dde4e8; border-radius: 8px; background: #fff; box-shadow: 0 10px 24px rgba(27,43,49,.08); }
    .product-photo { aspect-ratio: 1 / 1.08; background: #f7f8f8; overflow: hidden; }
    .product-photo img { width: 100%; height: 100%; object-fit: cover; }
    .product-body { display: grid; gap: 8px; padding: 16px; }
    .product-body h2 { min-height: 3.2em; margin: 0; font-size: 15px; line-height: 1.45; }
    .product-meta { color: #d9503f; font-size: 12px; font-weight: 900; }
    .product-bottom { display: grid; gap: 10px; font-weight: 900; }
    .product-bottom a { display: inline-flex; align-items: center; justify-content: center; min-height: 42px; border-radius: 8px; background: #222426; color: #fff; }
    @media (max-width: 920px) { .grid { grid-template-columns: repeat(2,minmax(0,1fr)); } }
    @media (max-width: 560px) { .wrap { padding: 20px 16px; } .top { display: grid; } h1 { font-size: 28px; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <div>
        <h1>衣台高校 商品候補</h1>
        <p>4件の商品候補を表示しています。商品ページで種類・サイズ・在庫をご確認ください。</p>
      </div>
      <div class="actions">
        <a class="button ghost" href="../">学校選択へ戻る</a>
        <a class="button" href="https://yuukichiya.base.shop/categories/5004467">BASEカテゴリで見る</a>
      </div>
    </div>
  </header>
  <main class="wrap">
    <div class="grid">
      <article class="product-card">
        <a class="product-photo" href="https://yuukichiya.base.shop/items/145086937"><img src="https://baseec-img-mng.akamaized.net/images/item/origin/e1da3f7f34aa07c233db1c70d0457b97.jpg?imformat=generic&amp;q=90&amp;im=Resize,width=640,type=normal" alt="衣台高校　旧タイプ長袖オーバーブラウス" loading="lazy" decoding="async"></a>
        <div class="product-body">
          <div class="product-meta">M</div>
          <h2>衣台高校　旧タイプ長袖オーバーブラウス</h2>
          <div class="product-bottom"><span>¥4,150</span><a href="https://yuukichiya.base.shop/items/145086937">商品を見る</a></div>
        </div>
      </article>
      <article class="product-card">
        <a class="product-photo" href="https://yuukichiya.base.shop/items/145087529"><img src="https://baseec-img-mng.akamaized.net/images/item/origin/848fa24e2153c2955adc95881c1ef3ae.jpg?imformat=generic&amp;q=90&amp;im=Resize,width=640,type=normal" alt="衣台高校　旧タイプ　ダブルプリーツ夏スカート" loading="lazy" decoding="async"></a>
        <div class="product-body">
          <div class="product-meta">W63×L54</div>
          <h2>衣台高校　旧タイプ　ダブルプリーツ夏スカート</h2>
          <div class="product-bottom"><span>¥7,500</span><a href="https://yuukichiya.base.shop/items/145087529">商品を見る</a></div>
        </div>
      </article>
      <article class="product-card">
        <a class="product-photo" href="https://yuukichiya.base.shop/items/145087738"><img src="https://baseec-img-mng.akamaized.net/images/item/origin/a1c9a0451bd59c6c2f5d192383569608.jpg?imformat=generic&amp;q=90&amp;im=Resize,width=640,type=normal" alt="衣台高校　旧タイプ　男子半袖ニットシャツ　サックス" loading="lazy" decoding="async"></a>
        <div class="product-body">
          <div class="product-meta">M</div>
          <h2>衣台高校　旧タイプ　男子半袖ニットシャツ　サックス</h2>
          <div class="product-bottom"><span>¥2,200</span><a href="https://yuukichiya.base.shop/items/145087738">商品を見る</a></div>
        </div>
      </article>
      <article class="product-card">
        <a class="product-photo" href="https://yuukichiya.base.shop/items/125876388"><img src="../assets/hero-uniform-display.png" alt="衣台高校　ジャージ上衣" loading="lazy" decoding="async"></a>
        <div class="product-body">
          <div class="product-meta">SS</div>
          <h2>衣台高校　ジャージ上衣</h2>
          <div class="product-bottom"><span>¥5,000</span><a href="https://yuukichiya.base.shop/items/125876388">商品を見る</a></div>
        </div>
      </article>
    </div>
  </main>
</body>
</html>
