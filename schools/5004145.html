    @media (max-width: 920px) { .grid { grid-template-columns: repeat(2,minmax(0,1fr)); } }
    @media (max-width: 560px) { .wrap { padding: 20px 16px; } .top { display: grid; } h1 { font-size: 28px; } .grid { grid-template-columns: 1fr; } }
