    a { color: inherit; text-decoration: none; }

    p { color: #68727d; font-weight: 700; }
    .button { display: inline-flex; align-items: center; justify-content: center; min-height: 44px; padding: 0 16px; border-radius: 8px; background: #2f7d5b; color: #fff; font-weight: 900; }
    .ghost { border: 1px solid #dde4e8; background: #fff; color: #222426; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .grid { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 20px; margin-top: 24px; }
    .product-card { display: grid; grid-template-rows: auto 1fr; overflow: hidden; border: 1px solid #dde4e8; border-radius: 8px; background: #fff; box-shadow: 0 10px 24px rgba(27,43,49,.08); }
    .product-photo { aspect-ratio: 1 / 1.08; background: #f7f8f8; overflow: hidden; }
    .product-photo img { width: 100%; height: 100%; object-fit: cover; }
    .product-body { display: grid; gap: 8px; padding: 16px; }
    .product-body h2 { min-height: 3.2em; margin: 0; font-size: 15px; line-height: 1.45; }
    .product-meta { color: #d9503f; font-size: 12px; font-weight: 900; }
    .product-bottom { display: grid; gap: 10px; font-weight: 900; }
    .product-bottom a { display: inline-flex; align-items: center; justify-content: center; min-height: 42px; border-radius: 8px; background: #222426; color: #fff; }
    @media (max-width: 920px) { .grid { grid-template-columns: repeat(2,minmax(0,1fr)); } }
    @media (max-width: 560px) { .wrap { padding: 20px 16px; } .top { display: grid; } h1 { font-size: 28px; } .grid { grid-template-columns: 1fr; } }
